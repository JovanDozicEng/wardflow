version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wardflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wardflow
      POSTGRES_PASSWORD: wardflow_dev_password
      POSTGRES_DB: wardflow
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wardflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wardflow-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wardflow-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ENV: development
      PORT: 8080
      LOG_LEVEL: info
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: wardflow
      DB_PASSWORD: wardflow_dev_password
      DB_NAME: wardflow
      DB_SSLMODE: disable
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRATION_HOURS: 24
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wardflow-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: wardflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wardflow-network

volumes:
  postgres_data:
    driver: local

networks:
  wardflow-network:
    driver: bridge
